<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PB Construction — Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>:root{
  --bg:#0c0e14;--s1:#131720;--s2:#191e2c;--s3:#1f2538;--s4:#252d40;
  --b1:#2b3350;--b2:#364060;--b3:#405080;
  --tx:#dde4f5;--t2:#8090b8;--t3:#485070;
  --ac:#4f7cff;--a2:#7ba3ff;--a3:#3a5fd4;
  --ok:#22c55e;--ok2:#16a34a;--warn:#f59e0b;--warn2:#d97706;
  --bad:#ef4444;--bad2:#dc2626;
  --ozk:#22c55e;--am:#f59e0b;
  --r:8px;--r2:12px;--r3:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-size:14px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
input,textarea,select{font-family:'DM Sans',sans-serif;color:var(--tx)}
button{font-family:'DM Sans',sans-serif}

/* === TOP BAR === */
#topbar{
  background:var(--s1);border-bottom:1px solid var(--b1);
  display:flex;align-items:center;padding:0 8px;
  height:54px;flex-shrink:0;overflow-x:auto;gap:2px;
}
#topbar::-webkit-scrollbar{height:3px}

.tab{
  display:flex;align-items:center;gap:8px;padding:0 14px;
  height:54px;border:none;background:none;color:var(--t2);
  font-size:13px;font-weight:500;cursor:pointer;
  white-space:nowrap;border-bottom:2px solid transparent;
  transition:all .15s;flex-shrink:0;position:relative;
}
.tab:hover{color:var(--tx);background:var(--s2)}
.tab.on{color:var(--a2);border-bottom-color:var(--ac);background:var(--s2)}
.tab .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-ozk{background:var(--ok)}.dot-am{background:var(--am)}.dot-admin{background:var(--ac)}
.tab .pct{font-family:'DM Mono',monospace;font-size:10px;padding:1px 6px;
  border-radius:8px;background:var(--s3);color:var(--t2)}
.tab.on .pct{background:rgba(79,124,255,.15);color:var(--a2)}
.tab .pending-badge{
  background:var(--warn);color:#000;font-family:'DM Mono',monospace;
  font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;
}

/* === PANELS === */
#content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.panel{display:none;flex:1;overflow:hidden;flex-direction:column}
.panel.on{display:flex}

/* === JOB PANEL === */
.jp-head{
  background:var(--s1);border-bottom:1px solid var(--b1);
  padding:14px 22px;flex-shrink:0;
}
.jp-head-row1{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.jp-addr{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;letter-spacing:-.3px}
.bank-tag{font-family:'DM Mono',monospace;font-size:10px;padding:3px 9px;
  border-radius:20px;font-weight:500;letter-spacing:.5px}
.bt-ozk{background:rgba(34,197,94,.1);color:var(--ok);border:1px solid rgba(34,197,94,.2)}
.bt-am{background:rgba(245,158,11,.1);color:var(--am);border:1px solid rgba(245,158,11,.2)}
.jp-head-row2{display:flex;align-items:center;gap:16px;margin-top:10px;flex-wrap:wrap}
.jp-stats{display:flex;gap:10px}
.jps{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);
  padding:8px 14px;text-align:center;min-width:72px}
.jps-v{font-family:'DM Mono',monospace;font-size:20px;line-height:1}
.jps-l{font-size:10px;color:var(--t3);margin-top:2px}
.jps-v.ok{color:var(--ok)}.jps-v.warn{color:var(--warn)}.jps-v.blue{color:var(--a2)}
.jp-prog{flex:1;max-width:240px}
.jp-prog-top{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-bottom:5px}
.jp-bar{height:6px;background:var(--s3);border-radius:3px;overflow:hidden}
.jp-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.pf-ozk{background:linear-gradient(90deg,var(--ok2),var(--ok))}
.pf-am{background:linear-gradient(90deg,var(--warn2),var(--warn))}
.curr-task{
  background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.18);
  border-radius:var(--r);padding:7px 13px;font-size:12px;color:var(--warn);
  display:flex;align-items:center;gap:7px;flex:1;max-width:500px;
}
.ct-label{color:var(--t3);font-size:10px;text-transform:uppercase;letter-spacing:1px;white-space:nowrap}

/* phase filter bar */
.filter-bar{
  background:var(--s2);border-bottom:1px solid var(--b1);
  padding:8px 22px;display:flex;align-items:center;gap:8px;
  flex-shrink:0;overflow-x:auto;
}
.filter-bar::-webkit-scrollbar{height:3px}
.fb-btn{
  padding:5px 12px;border-radius:6px;border:1px solid var(--b1);
  background:var(--s3);color:var(--t2);font-size:11px;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.fb-btn:hover{border-color:var(--b2);color:var(--tx)}
.fb-btn.on{background:rgba(79,124,255,.12);border-color:rgba(79,124,255,.35);color:var(--a2)}
.fb-sep{width:1px;height:18px;background:var(--b1);flex-shrink:0}
.fb-search{
  background:var(--s3);border:1px solid var(--b1);border-radius:6px;
  padding:5px 10px;font-size:12px;color:var(--tx);outline:none;width:160px;
}
.fb-search:focus{border-color:var(--ac)}
.fb-search::placeholder{color:var(--t3)}

/* task list */
.task-list{flex:1;overflow-y:auto;padding:16px 22px}

/* phase group */
.ph-group{margin-bottom:8px}
.ph-hd{
  display:flex;align-items:center;gap:10px;background:var(--s2);
  border:1px solid var(--b1);border-radius:var(--r);padding:9px 13px;
  cursor:pointer;transition:border-color .15s;user-select:none;
}
.ph-hd:hover{border-color:var(--b2)}
.ph-hd.open{border-radius:var(--r) var(--r) 0 0;border-color:var(--b2)}
.ph-name{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;flex:1}
.ph-meta{display:flex;align-items:center;gap:8px}
.ph-ok{font-family:'DM Mono',monospace;font-size:10px;color:var(--ok)}
.ph-left{font-family:'DM Mono',monospace;font-size:10px;color:var(--warn)}
.ph-mini-bar{width:50px;height:3px;background:var(--s4);border-radius:2px;overflow:hidden}
.ph-mini-fill{height:100%;background:var(--ok);border-radius:2px}
.ph-chev{color:var(--t3);font-size:11px;transition:transform .2s}
.ph-hd.open .ph-chev{transform:rotate(180deg)}

.ph-body{background:var(--s3);border:1px solid var(--b2);border-top:none;
  border-radius:0 0 var(--r) var(--r);display:none}
.ph-body.open{display:block}

/* task row */
.tr{display:flex;align-items:flex-start;gap:11px;padding:10px 13px;
  border-bottom:1px solid var(--b1);transition:background .1s;position:relative}
.tr:last-child{border-bottom:none}
.tr:hover{background:var(--s4)}
.tr.done-row{background:rgba(0,0,0,.1)}
.tr.curr-row{background:rgba(245,158,11,.03);border-left:2px solid var(--warn);padding-left:11px}

/* checkbox */
.cb{
  width:19px;height:19px;border-radius:5px;border:1.5px solid var(--b3);
  flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;font-size:11px;
}
.cb.done{background:var(--ok);border-color:var(--ok);color:#fff;cursor:default}
.cb.pend:hover{border-color:var(--ac);background:rgba(79,124,255,.08)}
.cb.curr-cb{border-color:var(--warn)}

.tr-body{flex:1;min-width:0}
.tr-title{font-size:13px;font-weight:500;line-height:1.3}
.tr-title.done-t{color:var(--t2)}
.tr-title.curr-t{color:var(--warn)}
.tr-title.pend-t{color:var(--tx)}
.tr-meta{display:flex;gap:12px;flex-wrap:wrap;margin-top:4px}
.trm{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--t3)}

/* completion stamp */
.done-stamp{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--ok);background:rgba(34,197,94,.07);
  padding:2px 8px;border-radius:4px;margin-top:5px;
}
.orig-stamp{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);margin-top:2px}

/* issue chip */
.issue-chip{
  display:inline-flex;align-items:center;gap:5px;cursor:pointer;
  font-size:11px;color:var(--warn);background:rgba(245,158,11,.07);
  border:1px solid rgba(245,158,11,.2);border-radius:4px;
  padding:2px 8px;margin-top:5px;max-width:340px;
}
.issue-chip .ic-txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.tr-actions{display:flex;gap:5px;flex-shrink:0;align-items:flex-start;padding-top:1px}
.trbtn{
  font-size:11px;padding:4px 9px;border-radius:5px;
  border:1px solid var(--b2);background:var(--s4);color:var(--t2);
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.trbtn:hover{border-color:var(--b3);color:var(--tx)}
.trbtn.blue{border-color:rgba(79,124,255,.3);color:var(--a2);background:rgba(79,124,255,.07)}
.trbtn.warn{border-color:rgba(245,158,11,.3);color:var(--warn);background:rgba(245,158,11,.07)}
.trbtn.ok{border-color:rgba(34,197,94,.3);color:var(--ok);background:rgba(34,197,94,.07)}

/* === MODAL === */
#mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;
  display:none;align-items:center;justify-content:center}
#mo.open{display:flex}
#mo-box{
  background:var(--s1);border:1px solid var(--b2);border-radius:var(--r3);
  padding:26px;width:500px;max-width:96vw;max-height:88vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}
.mo-title{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;margin-bottom:3px}
.mo-sub{font-size:12px;color:var(--t2);margin-bottom:20px;line-height:1.4}
.mo-vendor-card{
  background:var(--s3);border:1px solid var(--b1);border-radius:var(--r);
  padding:12px 14px;margin-bottom:16px;
}
.mo-vendor-card .mvc-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);
  text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px}
.mvc-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.mvc-row .k{color:var(--t3)}.mvc-row .v{color:var(--tx);font-weight:500}
.mf{margin-bottom:14px}
.mf label{display:block;font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.mf input,.mf textarea,.mf select{
  width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);
  padding:9px 12px;color:var(--tx);font-size:13px;outline:none;resize:vertical;
}
.mf input:focus,.mf textarea:focus,.mf select:focus{border-color:var(--ac)}
.mf textarea{min-height:72px}
.mo-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap}
.mbtn{padding:9px 20px;border-radius:var(--r);border:1px solid;font-size:13px;
  font-weight:500;cursor:pointer;transition:all .15s}
.mbtn-p{background:var(--ac);border-color:var(--ac);color:#fff}
.mbtn-p:hover{background:var(--a2)}
.mbtn-ok{background:var(--ok2);border-color:var(--ok);color:#fff}
.mbtn-ok:hover{background:var(--ok)}
.mbtn-g{background:none;border-color:var(--b2);color:var(--t2)}
.mbtn-g:hover{color:var(--tx)}
.mbtn-d{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--bad)}
.mbtn-d:hover{background:rgba(239,68,68,.2)}
.separator{border:none;border-top:1px solid var(--b1);margin:16px 0}

/* === ADMIN PANEL === */
.adm-head{background:var(--s1);border-bottom:1px solid var(--b1);
  padding:14px 22px;flex-shrink:0}
.adm-title{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.3px}
.adm-sub{font-size:12px;color:var(--t3);margin-top:3px}
.adm-nav{background:var(--s2);border-bottom:1px solid var(--b1);
  padding:0 22px;display:flex;gap:0;flex-shrink:0;overflow-x:auto}
.adm-nav::-webkit-scrollbar{height:3px}
.anav{padding:10px 16px;border:none;background:none;color:var(--t2);
  font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;
  white-space:nowrap;transition:all .15s}
.anav:hover{color:var(--tx)}
.anav.on{color:var(--a2);border-bottom-color:var(--ac)}
.adm-body{flex:1;overflow-y:auto;padding:22px}

/* admin views */
.av{display:none}.av.on{display:block}

/* summary tiles */
.sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:24px}
.sum-tile{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);
  padding:16px 14px}
.st-val{font-family:'DM Mono',monospace;font-size:28px;line-height:1}
.st-lbl{font-size:11px;color:var(--t3);margin-top:4px}
.st-val.ok{color:var(--ok)}.st-val.warn{color:var(--warn)}.st-val.blue{color:var(--a2)}.st-val.bad{color:var(--bad)}

/* progress rows */
.prog-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.prog-row{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);
  padding:13px 16px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:border-color .15s}
.prog-row:hover{border-color:var(--b2)}
.pr-id{font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);width:90px;flex-shrink:0}
.pr-addr{font-weight:600;font-size:14px;flex:1}
.pr-bank{flex-shrink:0}
.pr-bar-wrap{width:180px;flex-shrink:0}
.pr-bar-top{display:flex;justify-content:space-between;font-size:10px;color:var(--t2);margin-bottom:4px}
.pr-bar{height:5px;background:var(--s3);border-radius:3px;overflow:hidden}
.pr-bar-fill{height:100%;border-radius:3px}
.pr-tasks{font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);text-align:right;flex-shrink:0}

/* table */
.atw{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);overflow:hidden;margin-bottom:20px}
.at{width:100%;border-collapse:collapse;font-size:12px}
.at th{background:var(--s2);padding:8px 12px;text-align:left;
  font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);
  text-transform:uppercase;letter-spacing:1.2px;border-bottom:1px solid var(--b1);
  white-space:nowrap;position:sticky;top:0;z-index:1}
.at td{padding:9px 12px;border-bottom:1px solid var(--b1);vertical-align:middle}
.at tr:last-child td{border-bottom:none}
.at tr:hover td{background:var(--s2)}
.at .jc{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3)}
.at .tn{font-weight:500;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.at .tn.dt{color:var(--t3);text-decoration:line-through}
.at .vc{color:var(--t2);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.at .dc{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);white-space:nowrap}
.at .ic{color:var(--warn);font-size:11px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.spill{font-family:'DM Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;white-space:nowrap}
.sp-ok{background:rgba(34,197,94,.1);color:var(--ok)}
.sp-w{background:rgba(245,158,11,.1);color:var(--warn)}
.sp-b{background:rgba(79,124,255,.1);color:var(--a2)}
.sp-r{background:rgba(239,68,68,.1);color:var(--bad)}

/* vendor card */
.vendor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:20px}
.vc-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);padding:16px}
.vc-name{font-weight:600;font-size:14px;margin-bottom:10px}
.vc-field{display:flex;flex-direction:column;gap:2px;margin-bottom:8px}
.vc-field label{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.vc-field input{background:var(--s2);border:1px solid var(--b1);border-radius:5px;
  padding:6px 10px;font-size:12px;color:var(--tx);outline:none}
.vc-field input:focus{border-color:var(--ac)}
.vc-jobs{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.vc-job-tag{font-family:'DM Mono',monospace;font-size:9px;padding:1px 5px;
  border-radius:3px;background:var(--s3);color:var(--t2);border:1px solid var(--b1)}
.vc-task-count{font-size:11px;color:var(--t3);margin-top:4px}

/* section header */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.sec-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px}
.sec-sub{font-size:12px;color:var(--t3);margin-top:1px}
.sec-actions{display:flex;gap:8px}
.s-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--b1);
  background:var(--s2);color:var(--t2);font-size:12px;cursor:pointer;transition:all .15s}
.s-btn:hover{color:var(--tx);border-color:var(--b2)}
.s-btn.on{background:rgba(79,124,255,.1);border-color:rgba(79,124,255,.35);color:var(--a2)}

/* empty state */
.empty{text-align:center;padding:40px 20px;color:var(--t3);font-size:13px}
.empty .em-ico{font-size:32px;margin-bottom:10px;opacity:.4}

/* overdue highlight */
.overdue-row td{background:rgba(239,68,68,.03)!important}

/* ── DIRECTION BUTTONS ── */
.dir-btns {
  display:flex;gap:6px;margin-left:auto;flex-wrap:wrap;align-items:center;
}
.dir-btn {
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;
  border:1px solid var(--b2);background:var(--s3);color:var(--t2);
  text-decoration:none;transition:all .15s;white-space:nowrap;
}
.dir-btn:hover {
  background:var(--s4);color:var(--tx);border-color:var(--b3);
}
.dir-waze { border-color:rgba(0,210,80,.25);color:#00d250 }
.dir-waze:hover { background:rgba(0,210,80,.08);color:#00d250 }
.dir-apple { border-color:rgba(255,255,255,.15);color:var(--t2) }
.dir-apple:hover { background:rgba(255,255,255,.05);color:var(--tx) }

/* ── CLICKABLE PHONE ── */
.tel-link {
  color:var(--a2);text-decoration:none;font-weight:500;
  border-bottom:1px dashed rgba(123,163,255,.4);
  transition:color .15s;
}
.tel-link:hover { color:#fff;border-bottom-color:var(--a2); }

.inline-tel {
  font-family:'DM Mono',monospace;font-size:10px;color:var(--ac);
  text-decoration:none;background:rgba(79,124,255,.08);
  padding:1px 6px;border-radius:4px;border:1px solid rgba(79,124,255,.2);
  transition:all .15s;
}
.inline-tel:hover { background:rgba(79,124,255,.18);color:var(--a2); }

/* ── CALL BUTTON on vendor cards ── */
.call-btn {
  width:32px;height:32px;border-radius:7px;display:flex;align-items:center;
  justify-content:center;font-size:15px;flex-shrink:0;
  background:var(--s4);border:1px solid var(--b2);text-decoration:none;
  transition:all .15s;cursor:pointer;
}
.call-btn:hover { background:rgba(79,124,255,.12);border-color:rgba(79,124,255,.4);transform:scale(1.05); }

/* ── LIGHT MODE ── */
[data-theme="light"] {
  --bg:#f0f2f7;
  --s1:#ffffff;
  --s2:#f5f7fc;
  --s3:#eceef5;
  --s4:#e4e7f0;
  --b1:#d0d5e8;
  --b2:#b8bfd8;
  --b3:#9aa3c4;
  --tx:#1a1f36;
  --t2:#4a5280;
  --t3:#8b94b8;
  --ac:#3a6aff;
  --a2:#2d56d4;
  --a3:#1e45c0;
  --ok:#16a34a;
  --ok2:#15803d;
  --warn:#d97706;

  const addr = JOB_ADDRESSES[jobId] || '';
  return `https://maps.apple.com/?q=${encodeURIComponent(addr)}`;
}

function tel(phone) {
  if (!phone) return '';
  const digits = phone.replace(/\D/g,'');
  return digits ? `tel:+1${digits}` : '';
}

function openDir(url) {
  // Works from file://, hosted, and mobile
  const w = window.open(url, '_blank', 'noopener,noreferrer');
  if (!w || w.closed) {
    // Fallback: navigate current tab if popup blocked
    window.location.href = url;
  }
}

function copyAddr(addr) {
  if (!addr) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(addr).then(() => {
      showToast('📋 Address copied to clipboard!');
    }).catch(() => fallbackCopy(addr));
  } else {
    fallbackCopy(addr);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showToast('📋 Address copied!');
}

function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.style.cssText = `
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      background:#1a1f36;color:#e2e8f8;padding:10px 20px;border-radius:8px;
      font-size:13px;font-weight:500;z-index:999;opacity:0;
      transition:opacity .2s;box-shadow:0 4px 16px rgba(0,0,0,.3);
      pointer-events:none;font-family:'DM Sans',sans-serif;
    `;
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { toast.style.opacity = '0'; }, 2500);
}
// ─── STORAGE ───────────────────────────────────────────────────────────
const LS = {
  key: 'pb_construction_v2',
  load() {
    try { return JSON.parse(localStorage.getItem(this.key) || '{}'); } catch { return {}; }
  },
  save(data) { localStorage.setItem(this.key, JSON.stringify(data)); },
  get state() { return this._s || (this._s = this.load()); },
  reset() { this._s = {}; this.save({}); }
};

// state structure: { [jobId_taskId]: { completedDate, note, issue, vendorOverride } }
function getTS(jobId, taskId) { return LS.state[`${jobId}_${taskId}`] || null; }
function setTS(jobId, taskId, data) {
  const s = LS.state;
  s[`${jobId}_${taskId}`] = { ...(s[`${jobId}_${taskId}`] || {}), ...data };
  LS.save(s);
}
function clearTS(jobId, taskId) {
  const s = LS.state;
  delete s[`${jobId}_${taskId}`];
  LS.save(s);
}

// ── GLOBAL ISSUES ────────────────────────────────────────────────────
// Global issues: array of { id, title, description, affectedJobs[], vendor, date, resolved }
const GI_KEY = 'pb_global_issues_v1';
function loadGlobalIssues() {
  try { return JSON.parse(localStorage.getItem(GI_KEY) || '[]'); } catch { return []; }
}
function saveGlobalIssues(issues) { localStorage.setItem(GI_KEY, JSON.stringify(issues)); }
function addGlobalIssue(issue) {
  const issues = loadGlobalIssues();
  issue.id = Date.now().toString();
  issue.date = new Date().toISOString().slice(0,10);
  issue.resolved = false;
  issues.unshift(issue);
  saveGlobalIssues(issues);
  return issue;
}
function updateGlobalIssue(id, data) {
  const issues = loadGlobalIssues();
  const idx = issues.findIndex(i => i.id === id);
  if (idx >= 0) { issues[idx] = { ...issues[idx], ...data }; saveGlobalIssues(issues); }
}
function deleteGlobalIssue(id) {
  saveGlobalIssues(loadGlobalIssues().filter(i => i.id !== id));
}

// Vendor contacts: { [vendorName]: { phone, email, contact } }
const VC_KEY = 'pb_vendors_v2';
function loadVendors() {
  try { return JSON.parse(localStorage.getItem(VC_KEY) || '{}'); } catch { return {}; }
}
function saveVendors(v) { localStorage.setItem(VC_KEY, JSON.stringify(v)); }

// ─── HELPERS ───────────────────────────────────────────────────────────
const today = '2026-03-29';

function fmtDate(d) {
  if (!d || d === 'NaT') return '—';
  return d.replace(/^(\d{4})-(\d{2})-(\d{2})$/, '$2/$3/$1');
}
function isOverdue(task) {
  if (task.complete) return false;
  const jobId = task.jobId || (currentJob && currentJob.id);
  const ts = getTS(jobId, task.id);
  if (ts && ts.completedDate) return false;
  return task.end && task.end < today;
}
function isCompletedLocal(jobId, task) {
  if (task.complete) return true;
  const ts = getTS(jobId, task.id);
  return !!(ts && ts.completedDate);
}
function getCompletionDate(jobId, task) {
  if (task.complete) return task.end || task.start || '(from schedule)';
  const ts = getTS(jobId, task.id);
  return ts && ts.completedDate ? ts.completedDate : null;
}

// ─── THEME ─────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'light';
  html.setAttribute('data-theme', isLight ? 'dark' : 'light');
  localStorage.setItem('pb_theme', isLight ? 'dark' : 'light');
  const btn = document.getElementById('theme-btn');
  if (btn) btn.innerHTML = isLight ? '☀️ Light' : '🌙 Dark';
}

function applyTheme() {
  const saved = localStorage.getItem('pb_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
}

// ─── TABS ──────────────────────────────────────────────────────────────
function buildTabs() {
  const nav = document.getElementById('topbar');

// ─── JOB PANEL RENDER ──────────────────────────────────────────────────

  const pct = Math.round(done / job.tasks.length * 100);
  const bankCls = job.bank === 'Bank OZK' ? 'bt-ozk' : 'bt-am';

          <div class="jp-addr">${job.address}</div>
        </div>

          </button>

          </button>
        </div>
      </div>
      <div class="jp-head-row2">
        <div class="jp-stats">
          <div class="jps"><div class="jps-v ok">${done}</div><div class="jps-l">Done</div></div>
          <div class="jps"><div class="jps-v warn">${pending}</div><div class="jps-l">Pending</div></div>
          <div class="jps"><div class="jps-v blue">${job.tasks.length}</div><div class="jps-l">Total</div></div>
        </div>
        <div class="jp-prog">
          <div class="jp-prog-top"><span>Progress</span><span>${pct}%</span></div>
          <div class="jp-bar"><div class="jp-bar-fill ${barCls}" style="width:${pct}%"></div></div>
        </div>
        ${currTask ? `
        <div class="curr-task">
          <span class="ct-label">▶ Next</span>
          <span>${currTask.title}</span>
        </div>` : `<div class="curr-task" style="color:var(--ok)">✓ All tasks complete!</div>`}
      </div>
    </div>

    ${(function(){
      const gi = loadGlobalIssues().filter(i => !i.resolved && (i.affectedJobs.includes(job.id) || i.affectedJobs.includes('ALL')));
      // Note: banner shows all global issues for the job; individual tasks show the chip only if phase matches
      if (!gi.length) return '';
      return `<div class="global-issue-banner">
        <div class="gib-label">⚠ Global Issues Affecting This Job (${gi.length})</div>
        ${gi.map(i => `

            <div class="gib-top">
              <span class="gib-title">${i.title}</span>
              <span class="gib-date">${i.date}</span>

                : `<span class="trm" style="color:var(--t3);font-style:italic">📋 All tasks — <a href="#" onclick="editGlobalIssue('${i.id}');return false" style="color:var(--ac)">set specific trades</a></span>`}

function renderTaskList(job) {
  // ── BY ORDER mode: flat sequential list ──────────────────────────
  if (taskSortMode === 'order') {
    let tasks = [...job.tasks]; // already in order by id
    if (phaseFilter !== 'all') tasks = tasks.filter(t => (t.phase || 'Other') === phaseFilter);
    if (showOnlyPending) tasks = tasks.filter(t => !isCompletedLocal(job.id, t));
    if (taskSearch) tasks = tasks.filter(t =>
      t.title.toLowerCase().includes(taskSearch.toLowerCase()) ||
      (t.vendor||'').toLowerCase().includes(taskSearch.toLowerCase()) ||
      (t.phase||'').toLowerCase().includes(taskSearch.toLowerCase())
    );
    if (!tasks.length) return '<div class="empty"><div class="em-ico">☑</div>No tasks match current filters.</div>';

    return `<div class="order-list">
      ${tasks.map((t, idx) => {
        const isFirst = idx === 0;
        return `<div class="order-list-row">
          <div class="olr-num">${t.id}</div>
          <div style="flex:1;min-width:0">${renderTaskRow(job, t, true)}</div>
        </div>`;
      }).join('')}
    </div>`;
  }

  // ── BY TRADE (phase) mode: grouped accordion ──────────────────────
  const phases = [...new Set(job.tasks.map(t => t.phase || 'Other').filter(p => p !== 'nan'))];
  
  let html = '';
  phases.forEach(phase => {
    if (phaseFilter !== 'all' && phase !== phaseFilter) return;
    
    let tasks = job.tasks.filter(t => (t.phase || 'Other') === phase);
    if (showOnlyPending) tasks = tasks.filter(t => !isCompletedLocal(job.id, t));
    if (taskSearch) tasks = tasks.filter(t =>
      t.title.toLowerCase().includes(taskSearch.toLowerCase()) ||
      (t.vendor||'').toLowerCase().includes(taskSearch.toLowerCase())
    );
    if (!tasks.length) return;
    
    const phaseDone = tasks.filter(t => isCompletedLocal(job.id, t)).length;
    const phasePct = tasks.length ? Math.round(phaseDone/tasks.length*100) : 0;
    const phaseId = `ph-${job.id}-${phase.replace(/[^a-z0-9]/gi,'_')}`;
    
    html += `
    <div class="ph-group" id="${phaseId}">
      <div class="ph-hd open" onclick="togglePhase('${phaseId}')">
        <span class="ph-name">${phase}</span>
        <div class="ph-meta">
          <span class="ph-ok">✓ ${phaseDone}</span>
          <span class="ph-left">◯ ${tasks.length - phaseDone}</span>
          <div class="ph-mini-bar"><div class="ph-mini-fill" style="width:${phasePct}%"></div></div>
        </div>
        <span class="ph-chev">▼</span>
      </div>
      <div class="ph-body open" id="${phaseId}-body">
        ${tasks.map(t => renderTaskRow(job, t)).join('')}
      </div>
    </div>`;
  });
  
  return html || '<div class="empty"><div class="em-ico">☑</div>No tasks match current filters.</div>';
}

function renderTaskRow(job, task, inline=false) {
  const localDone = isCompletedLocal(job.id, task);
  const ts = getTS(job.id, task.id);
  const isCurr = !localDone && job.tasks.find(t => !isCompletedLocal(job.id, t))?.id === task.id;
  const overdue = isOverdue(task);
  
  // Check if any global issue affects this specific task (job + phase match)
  const taskPhase = task.phase || '';
  const globalIssuesForTask = loadGlobalIssues().filter(gi => {
    if (gi.resolved) return false;
    // Check job match
    const jobMatch = gi.affectedJobs.includes('ALL') || gi.affectedJobs.includes(job.id);
    if (!jobMatch) return false;
    // Check phase match — if affectedPhases is ALL or not set, show on all tasks
    if (!gi.affectedPhases || gi.affectedPhases.includes('ALL')) return true;
    // Otherwise only show if this task's phase is in the affected phases
    return gi.affectedPhases.includes(taskPhase);
  });
  const rowClass = localDone ? 'tr done-row' : isCurr ? 'tr curr-row' : overdue ? 'tr overdue-row' : 'tr';
  const cbClass = localDone ? 'cb done' : isCurr ? 'cb pend curr-cb' : 'cb pend';
  const titleClass = localDone ? 'tr-title done-t' : isCurr ? 'tr-title curr-t' : 'tr-title pend-t';
  
  const completedDate = getCompletionDate(job.id, task);
  
  return `
  <div class="${rowClass}" id="row-${job.id}-${task.id}">
    <div class="${cbClass}" onclick="handleCheck('${job.id}','${task.id}')" title="${localDone?'Mark incomplete':'Mark complete'}">
      ${localDone ? '✓' : ''}
    </div>
    <div class="tr-body">
      <div class="${titleClass}">${task.title}
        ${overdue ? '<span class="spill sp-r" style="margin-left:6px">OVERDUE</span>' : ''}
      </div>
      <div class="tr-meta">
        ${task.vendor && task.vendor !== 'nan' ? (function(){
          const vn = task.vendor.split(',')[0].trim();
          const vdata = loadVendors()[vn] || {};
          const ph = vdata.phone || '';
          const cell = vdata.cell || '';
          const email = vdata.email || '';
          const contact = vdata.contact || '';
          let out = `<span class="trm-vendor">`;
          out += `<span class="trm-vname">👤 ${vn}</span>`;
          if (contact) out += `<span class="trm-vcontact">${contact}</span>`;
          if (ph) out += `<a href="${tel(ph)}" class="trm-vcall" title="Call ${ph}">📞 ${ph}</a>`;
          if (cell && cell !== ph) out += `<a href="${tel(cell)}" class="trm-vcall trm-vcell" title="Cell ${cell}">📱 ${cell}</a>`;
          if (email) out += `<a href="mailto:${email}" class="trm-vcall trm-vemail" title="Email ${email}">✉️</a>`;
          out += `</span>`;
          return out;
        })() : ''}
        ${task.phase && task.phase !== 'nan' ? `<span class="trm">📋 ${task.phase}</span>` : ''}
        ${task.start ? `<span class="trm">📅 ${fmtDate(task.start)} → ${fmtDate(task.end)}</span>` : ''}
        ${task.duration ? `<span class="trm">⏱ ${task.duration}d</span>` : ''}
      </div>
      ${completedDate && localDone ? `<div class="done-stamp">✓ Completed ${task.complete ? fmtDate(completedDate) : completedDate}</div>` : ''}
      ${task.complete && !ts ? `<div class="orig-stamp">From schedule: ${fmtDate(task.end)}</div>` : ''}
      ${ts && ts.issue ? `<div class="issue-chip" onclick="openIssueModal('${job.id}','${task.id}')"><span>⚑</span><span class="ic-txt">${ts.issue}</span></div>` : ''}
      ${ts && ts.note ? `<div class="issue-chip" style="color:var(--a2);background:rgba(79,124,255,.06);border-color:rgba(79,124,255,.2)" onclick="openIssueModal('${job.id}','${task.id}')"><span>📝</span><span class="ic-txt">${ts.note}</span></div>` : ''}
      ${globalIssuesForTask.length > 0 ? globalIssuesForTask.map(gi => `
        <div class="global-task-issue-chip" onclick="switchAdminView('issues');showPanel('admin')">
          <span>⚠</span><span class="ic-txt">${gi.title}</span>
          <span class="gtic-badge">Global</span>
        </div>`).join('') : ''}
    </div>
    <div class="tr-actions">
      ${!localDone ? `<button class="trbtn ok" onclick="quickComplete('${job.id}','${task.id}')">✓ Done</button>` : ''}
      <button class="trbtn blue" onclick="openTaskModal('${job.id}','${task.id}')">⋯</button>
    </div>
  </div>`;
}

// ─── PHASE TOGGLE ──────────────────────────────────────────────────────
function togglePhase(id) {

// ─── FILTERS ───────────────────────────────────────────────────────────
function setPhaseFilter(jobId, phase) {
  phaseFilter = phase;
  document.querySelectorAll(`#fb-${jobId} .fb-btn`).forEach(b => b.classList.remove('on'));
  event.target.classList.add('on');
  document.getElementById(`tl-${jobId}`).innerHTML = renderTaskList(currentJob);
}
function togglePendingFilter(jobId) {
  showOnlyPending = !showOnlyPending;

  document.querySelectorAll(`#fb-${jobId} .fb-btn`).forEach((b,i) => b.classList.toggle('on', i === (showOnlyPending ? 1 : 0)));
  document.getElementById(`tl-${jobId}`).innerHTML = renderTaskList(currentJob);
}
function setTaskSearch(jobId, val) {
  taskSearch = val;
  document.getElementById(`tl-${jobId}`).innerHTML = renderTaskList(currentJob);
}

function setTaskSort(jobId, mode) {
  taskSortMode = mode;
  phaseFilter = 'all';
  // Update all filter bar buttons
  document.querySelectorAll(`#fb-${jobId} .fb-btn`).forEach(b => {
    if (b.textContent.includes('By Order')) b.classList.toggle('on', mode === 'order');
    else if (b.textContent.includes('By Trade')) b.classList.toggle('on', mode === 'phase');
    else if (b.textContent.includes('All Phases')) b.classList.toggle('on', mode === 'phase');
  });
  document.getElementById(`tl-${jobId}`).innerHTML = renderTaskList(currentJob);
}

// ─── QUICK COMPLETE ────────────────────────────────────────────────────
function quickComplete(jobId, taskId) {
  const now = new Date().toISOString().slice(0, 10);
  setTS(jobId, taskId, { completedDate: now });
  refreshJobView(jobId, taskId);
}

function handleCheck(jobId, taskId) {
  const job = JOBS.find(j => j.id === jobId);
  const task = job.tasks.find(t => t.id === taskId);
  if (task.complete) return; // Can't uncheck schedule items without modal
  const ts = getTS(jobId, taskId);
  if (ts && ts.completedDate) {
    // Already locally completed — open modal to edit or undo
    openTaskModal(jobId, taskId);
  } else {
    quickComplete(jobId, taskId);
  }
}

function refreshJobView(jobId, taskId) {
  const job = JOBS.find(j => j.id === jobId);
  if (currentJob && currentJob.id === jobId) {
    renderJobPanel(job);
  }
  // Update tab badge
  const pending = job.tasks.filter(t => !isCompletedLocal(job.id, t)).length;
  const pct = Math.round((job.tasks.length - pending) / job.tasks.length * 100);
  const tab = document.getElementById(`tab-${jobId}`);
  if (tab) {
    const pctEl = tab.querySelector('.pct');
    const badgeEl = tab.querySelector('.pending-badge');
    if (pctEl) pctEl.textContent = pct + '%';
    if (badgeEl) { if (pending > 0) badgeEl.textContent = pending; else badgeEl.remove(); }
    else if (pending > 0) {
      const b = document.createElement('span');
      b.className = 'pending-badge'; b.textContent = pending;
      tab.appendChild(b);
    }
  }
}

// ─── MODALS ────────────────────────────────────────────────────────────
let _modalCtx = null;

function openTaskModal(jobId, taskId) {
  const job = JOBS.find(j => j.id === jobId);
  const task = job.tasks.find(t => t.id === taskId);
  const ts = getTS(jobId, taskId) || {};
  const vendors = loadVendors();
  const vendorData = task.vendor && task.vendor !== 'nan' ? vendors[task.vendor] || {} : {};
  const localDone = isCompletedLocal(jobId, task);
  
  _modalCtx = { jobId, taskId };

  const today = new Date().toISOString().slice(0,10);
  const completedVal = ts.completedDate || (task.complete ? task.end : today);

  document.getElementById('mo-box').innerHTML = `
    <div class="mo-title">${task.title}</div>
    <div class="mo-sub">${job.address} &nbsp;·&nbsp; ${task.phase || ''} &nbsp;·&nbsp; Scheduled: ${fmtDate(task.start)} → ${fmtDate(task.end)}</div>

    ${task.vendor && task.vendor !== 'nan' ? `
    <div class="mo-vendor-card">
      <div class="mvc-lbl">🔧 Vendor</div>
      <div class="mvc-row"><span class="k">Assigned</span><span class="v">${task.vendor}</span></div>
      <div class="mvc-contact-btns">
        ${vendorData.phone ? `<a href="${tel(vendorData.phone)}" class="mvc-big-btn mvc-phone"><span>📞</span><div><div class="mvc-btn-label">Call Office</div><div class="mvc-btn-num">${vendorData.phone}</div></div></a>` : ''}
        ${vendorData.cell && vendorData.cell !== vendorData.phone ? `<a href="${tel(vendorData.cell)}" class="mvc-big-btn mvc-cell"><span>📱</span><div><div class="mvc-btn-label">Call Cell</div><div class="mvc-btn-num">${vendorData.cell}</div></div></a>` : ''}
        ${vendorData.email ? `<a href="mailto:${vendorData.email}" class="mvc-big-btn mvc-email"><span>✉️</span><div><div class="mvc-btn-label">Send Email</div><div class="mvc-btn-num">${vendorData.email}</div></div></a>` : ''}
      </div>
      ${vendorData.contact ? `<div class="mvc-row"><span class="k">Contact</span><span class="v">${vendorData.contact}</span></div>` : ''}
      ${vendorData.division ? `<div class="mvc-row"><span class="k">Trade</span><span class="v" style="color:var(--t2)">${vendorData.division}</span></div>` : ''}
    </div>` : ''}

    <div class="mf">
      <label>Completion Status</label>
      <select id="mo-status">
        <option value="${localDone?'done':'pending'}" selected>${localDone ? '✓ Completed' : '⏳ Pending'}</option>
        ${localDone ? '<option value="pending">⏳ Mark as Pending</option>' : '<option value="done">✓ Mark Complete</option>'}
      </select>
    </div>

    <div class="mf" id="mo-date-wrap" style="${localDone?'':'display:none'}">
      <label>Completion Date</label>
      <input type="date" id="mo-date" value="${completedVal||today}">
    </div>

    <div class="mf">
      <label>Issue / Reason for Delay</label>
      <textarea id="mo-issue" placeholder="Describe any issue, blocker, or reason this task is delayed…">${ts.issue||''}</textarea>
    </div>

    <div class="mf">
      <label>Notes</label>
      <textarea id="mo-note" placeholder="Additional notes, observations, or instructions…">${ts.note||''}</textarea>
    </div>

    <hr class="separator">
    <div class="mf">
      <label>Vendor Override (if different from schedule)</label>
      <input type="text" id="mo-vendor" placeholder="${task.vendor||'No vendor assigned'}" value="${ts.vendorOverride||''}">
    </div>

    <div class="mo-actions">
      ${!task.complete && localDone ? `<button class="mbtn mbtn-d" onclick="undoComplete()">↩ Undo Complete</button>` : ''}
      <button class="mbtn mbtn-g" onclick="closeModal()">Cancel</button>
      <button class="mbtn mbtn-ok" onclick="saveModal()">Save</button>
    </div>
  `;

  // Show/hide date when status changes
  document.getElementById('mo-status').onchange = function() {
    document.getElementById('mo-date-wrap').style.display = this.value === 'done' ? '' : 'none';
  };

  document.getElementById('mo').classList.add('open');
}

function openIssueModal(jobId, taskId) { openTaskModal(jobId, taskId); }

function saveModal() {
  const { jobId, taskId } = _modalCtx;
  const status = document.getElementById('mo-status').value;
  const date = document.getElementById('mo-date')?.value || '';
  const issue = document.getElementById('mo-issue').value.trim();
  const note = document.getElementById('mo-note').value.trim();
  const vendorOverride = document.getElementById('mo-vendor').value.trim();

  const update = { issue, note };
  if (vendorOverride) update.vendorOverride = vendorOverride;
  if (status === 'done') update.completedDate = date || new Date().toISOString().slice(0,10);
  else if (status === 'pending') update.completedDate = null;

  setTS(jobId, taskId, update);
  closeModal();
  refreshJobView(jobId, taskId);
}

function undoComplete() {
  const { jobId, taskId } = _modalCtx;
  setTS(jobId, taskId, { completedDate: null });
  closeModal();
  refreshJobView(jobId, taskId);
}

function closeModal() {
  document.getElementById('mo').classList.remove('open');
  _modalCtx = null;
}

// close on overlay click
document.getElementById('mo').addEventListener('click', e => { if (e.target.id === 'mo') closeModal(); });

// ─── ADMIN PANEL ───────────────────────────────────────────────────────
function renderAdminPanel() {
  renderAdminView(currentAdminView);
}

function switchAdminView(v) {
  currentAdminView = v;
  document.querySelectorAll('.anav').forEach(b => b.classList.toggle('on', b.dataset.v === v));
  renderAdminView(v);
}

function renderAdminView(v) {
  const body = document.getElementById('adm-body');
  document.querySelectorAll('.av').forEach(a => a.classList.remove('on'));
  const el = document.getElementById(`av-${v}`);
  if (el) el.classList.add('on');

  if (v === 'overview') renderOverview();
  else if (v === 'tasks') renderPendingTasks();
  else if (v === 'issues') renderIssues();
  else if (v === 'next') renderWhatNext();
  else if (v === 'vendors') renderVendors();
  else if (v === 'bybank') renderByBank();
}

    <div class="sum-tile"><div class="st-val ok">${totalDone}</div><div class="st-lbl">Completed</div></div>
    <div class="sum-tile"><div class="st-val warn">${totalPend}</div><div class="st-lbl">Pending</div></div>
    <div class="sum-tile"><div class="st-val bad">${overdue}</div><div class="st-lbl">Overdue</div></div>
    <div class="sum-tile"><div class="st-val warn">${allIssues.length}</div><div class="st-lbl">Open Issues</div></div>
    <div class="sum-tile"><div class="st-val ok">${ozk.length}</div><div class="st-lbl">Bank OZK Jobs</div></div>
    <div class="sum-tile"><div class="st-val warn">${am.length}</div><div class="st-lbl">Ameris Jobs</div></div>
  </div>

  <div class="sec-hd"><div><div class="sec-title">Job Progress</div></div></div>
  <div class="prog-list">
    ${JOBS.map(job => {
      const pending = job.tasks.filter(t => !isCompletedLocal(job.id, t)).length;
      const done = job.tasks.length - pending;
      const pct = Math.round(done/job.tasks.length*100);
      const currTask = job.tasks.find(t => !isCompletedLocal(job.id, t));
      const od = job.tasks.filter(t => isOverdue(t)).length;
      const taskIssues = job.tasks.filter(t => { const ts = getTS(job.id, t.id); return ts && ts.issue; }).length;
      const globalIss = loadGlobalIssues().filter(i => !i.resolved && (i.affectedJobs.includes('ALL') || i.affectedJobs.includes(job.id))).length;
      const totalIssues = taskIssues + globalIss;
      const barCls = job.bank === 'Bank OZK' ? 'pf-ozk' : 'pf-am';
      return `<div class="prog-row" onclick="showJobPanel(JOBS.find(j=>j.id==='${job.id}'))">
        <div class="pr-id">${job.id}</div>
        <div style="flex:1;min-width:0">
          <div class="pr-addr">${job.address}</div>
          <div style="font-size:11px;color:var(--t3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${currTask ? '▶ ' + currTask.title.slice(0,55) : '✓ Complete'}</div>
        </div>
        <div class="pr-bank"><span class="bank-tag ${job.bank==='Bank OZK'?'bt-ozk':'bt-am'}">${job.bank}</span></div>
        <div class="pr-chips">
          ${od > 0 ? `<span class="spill sp-r" title="${od} overdue tasks">⏰ ${od}</span>` : ''}
          ${totalIssues > 0 ? `<span class="spill sp-w" title="${totalIssues} open issues">⚑ ${totalIssues}</span>` : ''}

// Pending tasks (per job, per vendor)
function renderPendingTasks() {
  const el = document.getElementById('av-tasks');
  const allPending = JOBS.flatMap(j =>
    j.tasks.filter(t => !isCompletedLocal(j.id, t)).map(t => ({ ...t, jobId: j.id, jobAddr: j.address, bank: j.bank }))
  ).sort((a, b) => (a.start || '').localeCompare(b.start || ''));

  // Group by vendor
  const byVendor = {};
  allPending.forEach(t => {
    const v = t.vendor && t.vendor !== 'nan' ? t.vendor : '(Unassigned)';
    (byVendor[v] = byVendor[v] || []).push(t);
  });

  el.innerHTML = `
  <div class="sec-hd">
    <div><div class="sec-title">Pending Tasks</div><div class="sec-sub">${allPending.length} tasks remaining across all jobs</div></div>
    <div class="sec-actions">
      <select class="s-btn" onchange="filterPendingBy(this.value)">
        <option value="date">Sort by Date</option>
        <option value="job">Group by Job</option>
        <option value="vendor">Group by Vendor</option>
      </select>
    </div>
  </div>
  <div id="pending-content">${renderPendingByDate(allPending)}</div>`;
}

// Admin quick actions (work from any admin view)
function adminQuickDone(jobId, taskId, view) {
  const now = new Date().toISOString().slice(0,10);
  setTS(jobId, taskId, { completedDate: now });
  buildTabs();
  // Re-render current view
  if (view === 'next') renderAdminView('next');
  else if (view && view.startsWith('pending')) renderAdminView('tasks');
  else renderAdminView(currentAdminView);
}

function saveAdminIssue() {
  const { jobId, taskId, returnView } = _modalCtx;
  setTS(jobId, taskId, {
    issue: document.getElementById('qi-issue').value.trim(),
    note: document.getElementById('qi-note').value.trim()
  });
  closeModal();
  buildTabs();
  if (returnView === 'next') renderAdminView('next');
  else if (returnView && returnView.startsWith('pending')) renderAdminView('tasks');
  else renderAdminView(currentAdminView);
}

function clearAdminIssue() {
  const { jobId, taskId, returnView } = _modalCtx;
  setTS(jobId, taskId, { issue: '', note: '' });
  closeModal();
  if (returnView === 'next') renderAdminView('next');
  else renderAdminView('tasks');
}

window.filterPendingBy = function(mode) {
  const allPending = JOBS.flatMap(j =>
    j.tasks.filter(t => !isCompletedLocal(j.id, t)).map(t => ({ ...t, jobId: j.id, jobAddr: j.address, bank: j.bank }))
  ).sort((a, b) => (a.start || '').localeCompare(b.start || ''));
  const el = document.getElementById('pending-content');
  if (mode === 'date') el.innerHTML = renderPendingByDate(allPending);
  else if (mode === 'job') el.innerHTML = renderPendingByJob(allPending);
  else el.innerHTML = renderPendingByVendor(allPending);
};

      const od = isOverdue(t);
      const ts = getTS(t.jobId, t.id);
      return `<tr class="${od?'overdue-row':''}">
        <td><span class="jc">${t.jobId}</span><br><span style="font-size:11px;color:var(--t3)">${t.jobAddr.split(' ').slice(0,2).join(' ')}</span></td>
        <td>
          <span class="tn">${t.title}</span>
          ${ts&&ts.issue?`<br><span class="inline-issue-tag">⚑ ${ts.issue.slice(0,50)}</span>`:''}
          ${ts&&ts.note?`<br><span class="inline-note-tag">📝 ${ts.note.slice(0,40)}</span>`:''}
        </td>
        <td style="color:var(--t2);font-size:11px">${t.phase||'—'}</td>
        <td class="vc">${(function(){
          const vn = t.vendor&&t.vendor!=='nan'?t.vendor.split(',')[0].trim():'—';

function renderPendingByVendor(tasks) {

// Issues
// ── Issue filter state ──────────────────────────────────────────────
let issueFilterJob = '';
let issueFilterStatus = '';
let issueSearch = '';

function renderIssues() {
  const el = document.getElementById('av-issues');

  const allIssues = JOBS.flatMap(j =>
    j.tasks.map(t => {
      const ts = getTS(j.id, t.id);
      if (!ts || (!ts.issue && !ts.note)) return null;
      return { ...t, jobId: j.id, jobAddr: j.address, bank: j.bank, issue: ts.issue || '', note: ts.note || '' };
    }).filter(Boolean)
  );

  // Apply filters
  let issues = allIssues;
  if (issueFilterJob) issues = issues.filter(t => t.jobId === issueFilterJob);
  if (issueFilterStatus === 'open') issues = issues.filter(t => !isCompletedLocal(t.jobId, t));
  if (issueFilterStatus === 'done') issues = issues.filter(t => isCompletedLocal(t.jobId, t));
  if (issueSearch) {
    const q = issueSearch.toLowerCase();
    issues = issues.filter(t => t.title.toLowerCase().includes(q) || t.issue.toLowerCase().includes(q) || t.note.toLowerCase().includes(q));
  }

  const globalIssues = loadGlobalIssues();
  const openGlobal = globalIssues.filter(i => !i.resolved);
  const resolvedGlobal = globalIssues.filter(i => i.resolved);

  el.innerHTML = `
  <div class="sec-hd">
    <div>
      <div class="sec-title">Issues & Notes</div>
      <div class="sec-sub">${openGlobal.length} global · ${issues.length} of ${allIssues.length} task issues shown</div>
    </div>
    <div class="sec-actions">
      <button class="s-btn on" style="background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.35);color:var(--bad)" onclick="openGlobalIssueModal()">⚠ Add Global Issue</button>
      <button class="s-btn on" onclick="openAddIssueModal()">＋ Add Task Issue</button>
    </div>
  </div>

  <!-- FILTER BAR — always at top -->
  <div class="issue-filter-bar">
    <input class="fb-search" id="issue-search-input" placeholder="🔍  Search issues…" value="${issueSearch}" oninput="issueSearch=this.value;renderIssues()">
    <select class="filter-select-sm" onchange="issueFilterJob=this.value;renderIssues()">
      <option value="">All Jobs</option>

}

// ── Inline editing helpers ───────────────────────────────────────────
function saveInlineIssue(jobId, taskId, field, value) {
  setTS(jobId, taskId, { [field]: value.trim() });
  // re-render overview badge if needed
}

function clearIssueField(jobId, taskId, field) {
  setTS(jobId, taskId, { [field]: '' });
  renderIssues();
}

function addIssueInline(jobId, taskId) {
  setTS(jobId, taskId, { issue: 'New issue — click to edit' });
  renderIssues();
  // focus the new field
  setTimeout(() => {
    const el = document.getElementById(`issue-text-${jobId}-${taskId}`);
    if (el) { el.focus(); document.execCommand('selectAll', false, null); }
  }, 50);
}

function addNoteInline(jobId, taskId) {
  setTS(jobId, taskId, { note: 'New note — click to edit' });
  renderIssues();
}

function clearAllIssuesConfirm() {
  const n = JOBS.flatMap(j => j.tasks.filter(t => { const ts = getTS(j.id, t.id); return ts && (ts.issue || ts.note); })).length;
  if (!confirm(`Clear issues and notes from all ${n} flagged tasks? This cannot be undone.`)) return;
  JOBS.forEach(j => j.tasks.forEach(t => {
    const ts = getTS(j.id, t.id);
    if (ts && (ts.issue || ts.note)) setTS(j.id, t.id, { issue: '', note: '' });
  }));
  renderIssues();
}

          <label class="gi-check-row">
            <input type="checkbox" class="gi-job-cb" value="${j.id}" ${existing && (existing.affectedJobs.includes('ALL') || existing.affectedJobs.includes(j.id)) ? 'checked' : ''}>

          ${ALL_PHASES.map(p => `

            <input type="checkbox" class="gi-phase-cb" value="${p}"

const ALL_PHASES = ['Appliances','Block','Blower Door Test','Cabinets','Cleaning','Compaction','Countertops','Driveway','Drywall','Dumpsters','Electrical','Energy Testing','Exterior Doors','Exterior Doors & Windows','Field Survey','Finishing ','Flooring','Foundation','Framing','Garage Door','Grading','HVAC','House Wrap & Stucco','Insulation','Interior Trim & Doors','Landscaping','Line Pump','Paint','Pest Control','Plumbing','Portable Toilet','Roofing','Septic','Shelves / Mirrors / Acc.','Slab','Soffit & Fascia','Storm Shutters','Technology','Trigger','Trusses','Veneer','Well'];

window.toggleAllJobs = function(cb) {
  document.querySelectorAll('.gi-job-cb').forEach(c => c.checked = cb.checked);
};

window.toggleAllPhases = function(cb) {
  document.querySelectorAll('.gi-phase-cb').forEach(c => c.checked = cb.checked);
};

function saveGlobalIssueModal(existingId) {
  const title = document.getElementById('gi-title').value.trim();
  if (!title) { alert('Please enter a title.'); return; }

  const allChecked = document.getElementById('gi-all').checked;
  const jobCbs = [...document.querySelectorAll('.gi-job-cb:checked')].map(c => c.value);
  const affectedJobs = allChecked ? ['ALL'] : jobCbs;
  if (!affectedJobs.length) { alert('Please select at least one affected job.'); return; }

  const phaseAllChecked = document.getElementById('gi-phase-all').checked;
  const phaseCbs = [...document.querySelectorAll('.gi-phase-cb:checked')].map(c => c.value);
  const affectedPhases = phaseAllChecked ? ['ALL'] : phaseCbs.length > 0 ? phaseCbs : ['ALL'];
  // if nothing selected, default to ALL (and warn)
  if (!phaseAllChecked && phaseCbs.length === 0) {
    if (!confirm('No trades selected — this issue will show on ALL tasks in the affected jobs. Continue?')) return;
  }

  const data = {
    title,
    description: document.getElementById('gi-desc').value.trim(),
    vendor: document.getElementById('gi-vendor').value.trim(),
    affectedJobs,
    affectedPhases,
  };

  if (existingId) {
    updateGlobalIssue(existingId, data);
  } else {
    addGlobalIssue(data);
  }
  closeModal();
  renderIssues();
  // Refresh job panel if open
  if (currentJob) renderJobPanel(currentJob);
  // Update tab badges
  buildTabs();
}

function editGlobalIssue(id) { openGlobalIssueModal(id); }

function resolveGlobalIssue(id) {
  updateGlobalIssue(id, { resolved: true, resolvedDate: new Date().toISOString().slice(0,10) });
  renderIssues();
  if (currentJob) renderJobPanel(currentJob);
  buildTabs();
}

function reopenGlobalIssue(id) {
  updateGlobalIssue(id, { resolved: false, resolvedDate: null });
  renderIssues();
  if (currentJob) renderJobPanel(currentJob);
}

function populateAiTasks() {
  const jobId = document.getElementById('ai-job').value;
  const sel = document.getElementById('ai-task');
  if (!jobId) { sel.innerHTML = '<option value="">— Select job first —</option>'; return; }
  const job = JOBS.find(j => j.id === jobId);
  sel.innerHTML = job.tasks.map(t =>
    `<option value="${t.id}">[${isCompletedLocal(jobId, t) ? '✓' : '○'}] ${t.title}</option>`
  ).join('');
}

function saveAddIssue() {
  const jobId = document.getElementById('ai-job').value;
  const taskId = document.getElementById('ai-task').value;
  const issue = document.getElementById('ai-issue').value.trim();
  const note = document.getElementById('ai-note').value.trim();
  if (!jobId || !taskId) { alert('Please select a job and task.'); return; }
  if (!issue && !note) { alert('Please enter an issue or note.'); return; }
  setTS(jobId, taskId, { issue, note });
  closeModal();
  renderIssues();
}

// What's Next
function renderWhatNext() {
  const el = document.getElementById('av-next');
  const nextTasks = JOBS.map(job => {
    const next = job.tasks.filter(t => !isCompletedLocal(job.id, t));
    return { job, next: next.slice(0, 5) };
  });
  const overdueTasks = JOBS.flatMap(j =>
    j.tasks.filter(t => isOverdue(t)).map(t => ({ ...t, jobId: j.id, jobAddr: j.address, bank: j.bank }))
  ).sort((a,b) => a.end.localeCompare(b.end));

  el.innerHTML = `
  ${overdueTasks.length > 0 ? `
  <div class="sec-hd"><div><div class="sec-title" style="color:var(--bad)">⚠ Overdue Tasks</div><div class="sec-sub">${overdueTasks.length} tasks past their scheduled end date</div></div></div>
  <div class="atw" style="border-color:rgba(239,68,68,.3)"><table class="at"><thead><tr><th>Job</th><th>Task</th><th>Vendor</th><th>Was Due</th><th>Days Late</th><th>Actions</th></tr></thead>
  <tbody>${overdueTasks.map(t => {
    const daysLate = Math.round((new Date(today) - new Date(t.end)) / 86400000);
    const tsd = getTS(t.jobId, t.id);
    const vd = loadVendors()[(t.vendor||'').split(',')[0].trim()]||{};
    const ph = vd.phone||vd.cell||'';
    return `<tr class="overdue-row">
      <td><span class="jc">${t.jobId}</span><br><span style="font-size:10px;color:var(--t3)">${t.jobAddr.split(' ').slice(0,2).join(' ')}</span></td>
      <td>
        <span class="tn">${t.title}</span>
        ${tsd&&tsd.issue?`<br><span class="inline-issue-tag">⚑ ${tsd.issue.slice(0,50)}</span>`:''}
      </td>
      <td class="vc">${t.vendor&&t.vendor!=='nan'?(ph?`${t.vendor.split(',')[0].trim()}<br><a href="${tel(ph)}" class="inline-tel">${ph}</a>`:t.vendor.split(',')[0]):'—'}</td>
      <td class="dc" style="color:var(--bad)">${fmtDate(t.end)}</td>
      <td><span class="spill sp-r">${daysLate}d late</span></td>
      <td class="at-actions-cell">
        <button class="trbtn ok" onclick="adminQuickDone('${t.jobId}','${t.id}','next')">✓ Done</button>
        <button class="trbtn warn" onclick="adminQuickIssue('${t.jobId}','${t.id}','next')">⚑ Issue</button>
        <button class="trbtn blue" onclick="openTaskModal('${t.jobId}','${t.id}')">⋯</button>
      </td>
    </tr>`;
  }).join('')}</tbody></table></div>
  ` : `<div class="sum-tile" style="margin-bottom:20px;border-color:rgba(34,197,94,.3)"><div class="st-val ok">0</div><div class="st-lbl">No overdue tasks 🎉</div></div>`}

  <div class="sec-hd"><div><div class="sec-title">Next Up — Per Job</div><div class="sec-sub">Immediate next tasks for each active job</div></div></div>
  ${nextTasks.map(({ job, next: nextSlice }) => {
    const allPending = job.tasks.filter(t => !isCompletedLocal(job.id, t));
    const next = nextSlice;
    const remaining = allPending.length - next.length;
    return next.length ? `
    <div class="prog-row" style="flex-direction:column;align-items:flex-start;gap:8px;cursor:default;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:10px;width:100%;flex-wrap:wrap">
        <span class="jc" style="font-size:12px">${job.id}</span>

        <button class="s-btn" onclick="showJobPanel(JOBS.find(j=>j.id==='${job.id}'))" style="font-size:11px;padding:4px 10px">→ Open Job</button>
      </div>
      ${next.map((t,i) => {
        const tsd = getTS(job.id, t.id);
        const vd = loadVendors()[(t.vendor||'').split(',')[0].trim()]||{};

        <div style="display:flex;align-items:flex-start;gap:8px;padding:6px 0 6px 16px;border-bottom:1px solid var(--b1);width:100%">
          <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);width:18px;padding-top:2px">${i+1}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;${i===0?'color:var(--warn);font-weight:600':''};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.title}</div>

            <button class="trbtn ok" onclick="adminQuickDone('${job.id}','${t.id}','next')" title="Mark complete">✓</button>

      }).join('')}
    </div>
    ${remaining > 0 ? `<div style="padding:8px 16px;font-size:11px;color:var(--t3);border-top:1px solid var(--b1)">
      + ${remaining} more pending tasks — <button class="s-btn" onclick="showJobPanel(JOBS.find(j=>j.id==='${job.id}'))" style="font-size:11px;padding:2px 8px;display:inline-flex">view all</button>
    </div>` : ''}
    ` : '';
  }).join('')}`;
}

// Vendors
function renderVendors() {
  const el = document.getElementById('av-vendors');
  const vendorMap = {};
  JOBS.forEach(job => {
    job.tasks.forEach(t => {
      if (!t.vendor || t.vendor === 'nan') return;
      t.vendor.split(',').map(v => v.trim()).forEach(v => {
        if (!vendorMap[v]) vendorMap[v] = { jobs: new Set(), tasks: [], pending: 0, done: 0 };
        vendorMap[v].jobs.add(job.id);
        vendorMap[v].tasks.push({ ...t, jobId: job.id, jobAddr: job.address });
        if (isCompletedLocal(job.id, t)) vendorMap[v].done++;
        else vendorMap[v].pending++;
      });
    });
  });

  const vendors = loadVendors();

  el.innerHTML = `
  <div class="sec-hd">
    <div><div class="sec-title">Vendor Contact List</div><div class="sec-sub">${Object.keys(vendorMap).length} vendors active across all jobs — click fields to add contact info</div></div>
    <div class="sec-actions">
      <button class="s-btn on" onclick="openReplaceVendorModal()" style="background:rgba(79,124,255,.1);border-color:rgba(79,124,255,.35);color:var(--a2)">🔄 Replace Vendor</button>
      <button class="s-btn" onclick="saveAllVendors()">💾 Save All Contacts</button>
    </div>
  </div>
  <div class="vendor-search-bar">
    <input class="fb-search" id="vendor-search-box" placeholder="🔍  Search vendors by name, trade, or contact…"

    <select class="filter-select-sm" id="vendor-sort-sel" onchange="filterVendorCards(document.getElementById('vendor-search-box').value)">
      <option value="name">Sort: A–Z</option>
      <option value="pending">Sort: Most Pending</option>

        <div class="vc-field">
          <label>Phone</label>
          <div style="display:flex;align-items:center;gap:6px">
            <input type="tel" data-vendor="${safeName}" data-field="phone" style="flex:1" placeholder="(321) 000-0000" value="${vc.phone||''}">
            ${vc.phone ? `<a href="${tel(vc.phone)}" class="call-btn" title="Call ${name}">📞</a>` : ''}
          </div>
        </div>
        <div class="vc-field">
          <label>Cell</label>
          <div style="display:flex;align-items:center;gap:6px">
            <input type="tel" data-vendor="${safeName}" data-field="cell" style="flex:1" placeholder="(321) 000-0000" value="${vc.cell||''}">
            ${vc.cell ? `<a href="${tel(vc.cell)}" class="call-btn" title="Text/Call cell">📱</a>` : ''}
          </div>
        </div>
        <div class="vc-field">
          <label>Email</label>

            ${vc.email ? `<a href="mailto:${vc.email}" class="call-btn" title="Email">✉️</a>` : ''}
          </div>
        </div>
        ${vc.division ? `<div style="font-size:10px;color:var(--t3);padding:2px 0;border-top:1px solid var(--b1);margin-top:6px;padding-top:6px">🔧 ${vc.division}</div>` : ''}
        <div class="vc-task-count" style="margin-top:6px">
          <span class="spill sp-ok">${info.done} done</span>
          <span class="spill sp-w" style="margin-left:4px">${info.pending} pending</span>
        </div>
        <div class="vc-jobs">${[...info.jobs].map(j=>`<span class="vc-job-tag">${j}</span>`).join('')}</div>

    }).join('')}

}

// ── VENDOR REPLACEMENT ──────────────────────────────────────────────
function openReplaceVendorModal() {
  // Build list of all vendors currently assigned to open tasks
  const activeVendors = {};
  JOBS.forEach(job => {
    job.tasks.forEach(t => {
      if (!t.vendor || t.vendor === 'nan') return;
      if (isCompletedLocal(job.id, t)) return; // only open tasks
      t.vendor.split(',').map(v => v.trim()).forEach(v => {
        if (!activeVendors[v]) activeVendors[v] = { jobs: new Set(), phases: new Set(), tasks: [] };
        activeVendors[v].jobs.add(job.id);
        activeVendors[v].phases.add(t.phase || 'Other');
        activeVendors[v].tasks.push({ ...t, jobId: job.id, jobAddr: job.address });
      });
    });
  });

  const sortedVendors = Object.keys(activeVendors).sort();
  const allKnownVendors = Object.keys(loadVendors()).sort();

  document.getElementById('mo-box').innerHTML = `
    <div class="mo-title">🔄 Replace Vendor</div>
    <div class="mo-sub">Reassign open tasks from one vendor to another. Completed tasks are not affected.</div>

    <div class="mf">
      <label>Current Vendor (to replace)</label>
      <select id="rv-from" onchange="updateReplacePreview()">
        <option value="">— Select vendor to replace —</option>
        ${sortedVendors.map(v => `<option value="${v}">${v} (${activeVendors[v].tasks.length} open tasks)</option>`).join('')}
      </select>
    </div>

    <div class="mf">
      <label>New Vendor (replacement)</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="text" id="rv-to" list="rv-to-list" style="flex:1"
          placeholder="Type existing or new vendor name…" oninput="updateReplacePreview();checkNewVendor()">
        <datalist id="rv-to-list">
          ${allKnownVendors.map(v => `<option value="${v}">`).join('')}
        </datalist>
        <button class="mbtn mbtn-g" onclick="toggleNewVendorForm()" id="rv-new-btn" title="Create new vendor" style="white-space:nowrap;padding:8px 12px">＋ New</button>
      </div>
    </div>

    <!-- New Vendor Form (hidden by default) -->
    <div id="rv-new-vendor-form" style="display:none">
      <div class="new-vendor-card">
        <div class="nvc-hd">
          <span>📋 New Vendor Details</span>
          <span style="font-size:11px;color:var(--t3)">Fill in contact info — saved to your vendor list</span>
        </div>
        <div class="nvc-grid">
          <div class="mf" style="margin-bottom:8px">
            <label>Company Name *</label>
            <input type="text" id="nv-name" placeholder="Company / Contractor name" oninput="syncVendorName()">
          </div>
          <div class="mf" style="margin-bottom:8px">
            <label>Contact Person</label>
            <input type="text" id="nv-contact" placeholder="First Last">
          </div>
          <div class="mf" style="margin-bottom:8px">
            <label>Phone</label>
            <input type="tel" id="nv-phone" placeholder="(321) 000-0000">
          </div>
          <div class="mf" style="margin-bottom:8px">
            <label>Cell</label>
            <input type="tel" id="nv-cell" placeholder="(321) 000-0000">
          </div>
          <div class="mf" style="margin-bottom:8px">
            <label>Email</label>
            <input type="email" id="nv-email" placeholder="vendor@email.com">
          </div>
          <div class="mf" style="margin-bottom:0">
            <label>Trade / Division</label>
            <input type="text" id="nv-division" placeholder="Plumbing, Electrical…">
          </div>
        </div>
        <div style="margin-top:10px;font-size:11px;color:var(--t3)">
          ✓ This vendor will be saved to your contacts and used as the replacement.
        </div>
      </div>
    </div>

    <div id="rv-preview" style="margin-bottom:14px"></div>

    <div class="mo-actions">
      <button class="mbtn mbtn-g" onclick="closeModal()">Cancel</button>
      <button class="mbtn mbtn-p" onclick="executeReplaceVendor()" id="rv-execute" disabled>Replace Selected Tasks</button>
    </div>
  `;
  document.getElementById('mo').classList.add('open');
}

// Build preview when from/to selected
window.updateReplacePreview = function() {
  const fromVendor = document.getElementById('rv-from').value;
  const toVendor = document.getElementById('rv-to').value.trim();
  const preview = document.getElementById('rv-preview');
  const execBtn = document.getElementById('rv-execute');

  if (!fromVendor || !toVendor) {
    preview.innerHTML = '';
    execBtn.disabled = true;
    return;
  }

  if (fromVendor === toVendor) {
    preview.innerHTML = `<div class="rv-warn">⚠ New vendor is the same as current vendor.</div>`;
    execBtn.disabled = true;
    return;
  }

  // Gather all open tasks for this vendor
  const tasks = [];
  JOBS.forEach(job => {
    job.tasks.forEach(t => {
      if (isCompletedLocal(job.id, t)) return;
      if (!t.vendor || t.vendor === 'nan') return;
      if (t.vendor.split(',').map(v => v.trim()).includes(fromVendor)) {
        tasks.push({ ...t, jobId: job.id, jobAddr: job.address });
      }
    });
  });

  // Group by phase
  const byPhase = {};
  tasks.forEach(t => {
    const p = t.phase || 'Other';
    (byPhase[p] = byPhase[p] || []).push(t);
  });

  const phases = Object.keys(byPhase).sort();

  preview.innerHTML = `
    <div class="rv-preview-box">
      <div class="rv-preview-hd">
        <span class="rv-from-lbl">${fromVendor}</span>
        <span style="color:var(--t3);margin:0 8px">→</span>
        <span class="rv-to-lbl">${toVendor}</span>
        <span style="color:var(--t3);font-size:11px;margin-left:8px">${tasks.length} tasks total</span>
      </div>

      <div style="font-size:11px;color:var(--t3);margin-bottom:10px">
        Check the tasks you want to reassign:
      </div>

      <label class="rv-select-all-row">
        <input type="checkbox" id="rv-select-all" checked onchange="toggleAllRvTasks(this)">
        <strong>Select All (${tasks.length} tasks)</strong>
      </label>

      ${phases.map(phase => `
        <div class="rv-phase-group">
          <div class="rv-phase-hd">
            <input type="checkbox" class="rv-phase-cb" data-phase="${phase}" checked
              onchange="toggleRvPhase(this,'${phase.replace(/'/g,"\'")}')">
            <span class="rv-phase-name">📋 ${phase}</span>
            <span class="rv-phase-count">${byPhase[phase].length}</span>
          </div>
          ${byPhase[phase].map(t => `
            <label class="rv-task-row">
              <input type="checkbox" class="rv-task-cb" data-job="${t.jobId}" data-task="${t.id}" checked>
              <div class="rv-task-info">
                <span class="rv-task-title">${t.title}</span>
                <span class="rv-task-job">${t.jobId} · ${t.jobAddr.split(' ').slice(0,2).join(' ')}</span>
              </div>
              <span class="rv-task-date">${fmtDate(t.end)}</span>
            </label>
          `).join('')}
        </div>
      `).join('')}
    </div>
  `;
  execBtn.disabled = false;
};

window.toggleAllRvTasks = function(cb) {
  document.querySelectorAll('.rv-task-cb,.rv-phase-cb').forEach(c => c.checked = cb.checked);
};

window.toggleRvPhase = function(cb, phase) {
  document.querySelectorAll(`.rv-task-cb[data-phase]`).forEach(c => {
    // find task rows in this phase group
  });
  // Find sibling task checkboxes in same phase group
  const phaseGroup = cb.closest('.rv-phase-group');
  if (phaseGroup) phaseGroup.querySelectorAll('.rv-task-cb').forEach(c => c.checked = cb.checked);
  // Update select-all
  const allCbs = [...document.querySelectorAll('.rv-task-cb')];
  const allSa = document.getElementById('rv-select-all');
  if (allSa) allSa.checked = allCbs.every(c => c.checked);
};

window.toggleNewVendorForm = function() {
  const form = document.getElementById('rv-new-vendor-form');
  const btn = document.getElementById('rv-new-btn');
  const nameInput = document.getElementById('nv-name');
  if (form.style.display === 'none') {
    form.style.display = 'block';
    btn.textContent = '✕ Cancel';
    btn.style.color = 'var(--bad)';
    // Pre-fill name from rv-to if typed
    const typed = document.getElementById('rv-to').value.trim();
    if (typed && nameInput) nameInput.value = typed;
    if (nameInput) nameInput.focus();
  } else {
    form.style.display = 'none';
    btn.textContent = '＋ New';
    btn.style.color = '';
  }
};

window.syncVendorName = function() {
  // Keep the rv-to field in sync with nv-name
  const name = document.getElementById('nv-name').value.trim();
  const rvTo = document.getElementById('rv-to');
  if (rvTo) { rvTo.value = name; updateReplacePreview(); }
};

window.checkNewVendor = function() {
  // If user types something not in known vendors, suggest creating
  const val = document.getElementById('rv-to').value.trim();
  const allKnown = Object.keys(loadVendors());
  const btn = document.getElementById('rv-new-btn');
  if (!btn) return;
  if (val && !allKnown.includes(val)) {
    btn.textContent = '＋ Create';
    btn.style.color = 'var(--ok)';
    btn.style.borderColor = 'rgba(34,197,94,.4)';
    // Pre-fill name field if form is open
    const nv = document.getElementById('nv-name');
    if (nv && !nv.value) nv.value = val;
  } else {
    const form = document.getElementById('rv-new-vendor-form');
    if (form && form.style.display === 'none') {
      btn.textContent = '＋ New';
      btn.style.color = '';
      btn.style.borderColor = '';
    }
  }
};

function saveNewVendorIfNeeded() {
  const form = document.getElementById('rv-new-vendor-form');
  if (!form || form.style.display === 'none') return true; // no new vendor form open

  const name = document.getElementById('nv-name').value.trim();
  if (!name) { alert('Please enter a company name for the new vendor.'); return false; }

  // Save to vendor contacts
  const vendors = loadVendors();
  vendors[name] = {
    contact: document.getElementById('nv-contact').value.trim(),
    phone:   document.getElementById('nv-phone').value.trim(),
    cell:    document.getElementById('nv-cell').value.trim(),
    email:   document.getElementById('nv-email').value.trim(),
    division: document.getElementById('nv-division').value.trim(),
  };
  saveVendors(vendors);

  // Also sync rv-to
  document.getElementById('rv-to').value = name;
  return true;
}

function executeReplaceVendor() {
  // Save new vendor first if form is open
  if (!saveNewVendorIfNeeded()) return;

  const fromVendor = document.getElementById('rv-from').value;
  const toVendor = document.getElementById('rv-to').value.trim();
  if (!fromVendor || !toVendor) { alert('Please select both vendors.'); return; }
  if (fromVendor === toVendor) { alert('Old and new vendor are the same.'); return; }

  // Get selected task checkboxes
  const selected = [...document.querySelectorAll('.rv-task-cb:checked')];
  if (!selected.length) { alert('No tasks selected.'); return; }

  let count = 0;
  selected.forEach(cb => {
    const jobId = cb.dataset.job;
    const taskId = cb.dataset.task;
    const job = JOBS.find(j => j.id === jobId);
    if (!job) return;
    const task = job.tasks.find(t => t.id === taskId);
    if (!task) return;

    // Replace vendor in task data (runtime only — data is embedded)
    // Store vendor override in localStorage
    const ts = getTS(jobId, taskId) || {};
    setTS(jobId, taskId, { ...ts, vendorOverride: toVendor });

    // Also update the task object in memory so UI reflects immediately
    const originalVendor = task.vendor;
    if (originalVendor.includes(',')) {
      // Multi-vendor: replace only the matching one
      task.vendor = originalVendor.split(',').map(v => v.trim() === fromVendor ? toVendor : v.trim()).join(', ');
    } else {
      task.vendor = toVendor;
    }
    count++;
  });

  closeModal();
  showToast(`✓ ${count} tasks reassigned from "${fromVendor}" to "${toVendor}"`);

  // Refresh current views
  buildTabs();
  if (currentJob) renderJobPanel(currentJob);
  renderAdminView('vendors');
}

window.filterVendorCards = function(query) {
  const q = (query || '').toLowerCase().trim();
  const sort = (document.getElementById('vendor-sort-sel') || {}).value || 'name';
  const cards = [...document.querySelectorAll('.vc-card')];
  let visible = 0;
  cards.forEach(card => {
    const text = card.textContent.toLowerCase();
    const show = !q || text.includes(q);
    card.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  // Sort visible cards
  const grid = document.getElementById('vendor-grid');
  if (grid && sort !== 'name') {
    const sorted = cards.filter(c => c.style.display !== 'none').sort((a, b) => {
      const getNum = el => {
        const spill = el.querySelector('.spill');
        // done count is first sp-ok, pending is sp-w
        if (sort === 'pending') {
          const pw = el.querySelector('.spill.sp-w');
          return pw ? parseInt(pw.textContent) || 0 : 0;
        } else {
          const po = el.querySelector('.spill.sp-ok');
          return po ? parseInt(po.textContent) || 0 : 0;
        }
      };
      return getNum(b) - getNum(a);
    });
    sorted.forEach(c => grid.appendChild(c));
  }
  const lbl = document.getElementById('vendor-count-label');
  if (lbl) lbl.textContent = q ? `${visible} of ${cards.length} vendors` : `${cards.length} vendors`;
};

window.saveAllVendors = function() {
  const vendors = loadVendors();
  document.querySelectorAll('#vendor-grid [data-vendor]').forEach(input => {
    const v = input.dataset.vendor;
    const f = input.dataset.field;
    if (!vendors[v]) vendors[v] = {};
    vendors[v][f] = input.value.trim();
  });
  saveVendors(vendors);
  // Flash confirm
  const btn = document.querySelector('[onclick="saveAllVendors()"]');
  const orig = btn.textContent;
  btn.textContent = '✓ Saved!';
  btn.style.color = 'var(--ok)';
  setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 2000);
};

// By Bank
function renderByBank() {
  const el = document.getElementById('av-bybank');
  const banks = ['Bank OZK', 'Ameris'];
  
  el.innerHTML = banks.map(bank => {
    const bJobs = JOBS.filter(j => j.bank === bank);
    const totalTasks = bJobs.reduce((acc, j) => acc + j.tasks.length, 0);
    const totalDone2 = bJobs.reduce((acc, j) => acc + j.tasks.filter(t => isCompletedLocal(j.id, t)).length, 0);
    const totalPend = totalTasks - totalDone2;
    const pct = totalTasks ? Math.round(totalDone2/totalTasks*100) : 0;
    const colorCls = bank === 'Bank OZK' ? 'ok' : 'warn';
    const barCls = bank === 'Bank OZK' ? 'pf-ozk' : 'pf-am';
    
    return `
    <div style="margin-bottom:32px">
      <div class="sec-hd">
        <div>
          <div class="sec-title" style="color:var(--${colorCls})">${bank}</div>
          <div class="sec-sub">${bJobs.length} jobs · ${totalDone2} done / ${totalTasks} total · ${pct}% overall</div>
        </div>
        <div style="width:200px">
          <div class="jp-bar" style="height:8px"><div class="jp-bar-fill ${barCls}" style="width:${pct}%"></div></div>
        </div>
      </div>
      <div class="sum-grid" style="grid-template-columns:repeat(4,1fr)">
        <div class="sum-tile"><div class="st-val ${colorCls}">${bJobs.length}</div><div class="st-lbl">Jobs</div></div>
        <div class="sum-tile"><div class="st-val ok">${totalDone2}</div><div class="st-lbl">Done</div></div>
        <div class="sum-tile"><div class="st-val warn">${totalPend}</div><div class="st-lbl">Pending</div></div>
        <div class="sum-tile"><div class="st-val bad">${bJobs.reduce((a,j)=>a+j.tasks.filter(t=>isOverdue(t)).length,0)}</div><div class="st-lbl">Overdue</div></div>
      </div>
      <div class="prog-list">
        ${bJobs.map(job => {
          const pd = job.tasks.filter(t => !isCompletedLocal(job.id, t)).length;
          const dn = job.tasks.length - pd;
          const p = Math.round(dn/job.tasks.length*100);
          const curr = job.tasks.find(t => !isCompletedLocal(job.id, t));
          return `<div class="prog-row" onclick="showJobPanel(JOBS.find(j=>j.id==='${job.id}'))">
            <div class="pr-id">${job.id}</div>
            <div style="flex:1"><div style="font-weight:600">${job.address}</div>
              <div style="font-size:11px;color:var(--t3);margin-top:2px">${curr?'▶ '+curr.title.slice(0,50):'✓ Complete'}</div>
            </div>
            <div class="pr-bar-wrap">
              <div class="pr-bar-top"><span>${dn}/${job.tasks.length}</span><span>${p}%</span></div>
              <div class="pr-bar"><div class="pr-bar-fill ${barCls}" style="width:${p}%"></div></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}
